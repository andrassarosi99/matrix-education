[build]
  command = "echo 'No build needed'"
  publish = "neoai-site/"

[functions]
  directory = "neoai-site/netlify/functions"

# Per-function override for the mobile Neo chat function.
# It uses TypeScript imports from sibling `prompts/` files, which require the
# esbuild bundler to bundle correctly. Scoped to just this function so the
# other function (neo-chat.js, serving the website hero chatbot) keeps
# whatever default bundler it had.
[functions."neo-chat-mobile"]
  node_bundler = "esbuild"
